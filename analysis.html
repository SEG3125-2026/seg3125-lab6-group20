<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Sephora Website UI Survey Results</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- chart.js is a built in function-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<h1>Sephora Survey Results</h1>

	<canvas id="resultChart" width="500" height="250"></canvas>

	<script>
		async function loadResults(){
			const response = await fetch("/surveyresults");
			const data = await response.json();
			const responses = data.responses; 

			let numOfYes = 0;
			let numOfNo = 0; 

			responses.forEach(r => {
				if(r.productVisuals === "yes"){
					numOfYes ++;
				}
				if(r.productVisuals === "no"){
					numOfNo ++;
				}
			}); 

			new Chart(document.getElementById("resultChart"), { type:"pie",data:{labels:["Yes","No"], datasets:[{data: [numOfYes,numOfNo]}]}});
		}
		loadResults();
	</script>
</body>
</html>
